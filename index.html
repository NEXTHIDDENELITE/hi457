<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE 3-DAY TRIAL</title>
    <link rel="icon" type="image/png" href="logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-green: #00ff66;
            --gradient-btn: linear-gradient(135deg, #00ff66, #00b300);
            --danger: #ff0055;
            --glass-border: rgba(255, 255, 255, 0.05);
            --card-shadow: 0 0 40px rgba(255, 0, 0, 0.25);
            --neon-red: #ff3333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background: #030305;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            overflow: hidden;
            position: relative;
            user-select: none; 
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0d0d13 0%, #030305 100%);
            z-index: -1;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(13, 13, 18, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid var(--neon-red);
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: var(--card-shadow);
            position: relative;
            z-index: 1;
        }

        .logo-area {
            width: 65px;
            height: 65px;
            margin: 0 auto 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .panel-logo {
            width: 45px;
            height: 45px;
            object-fit: cover;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: var(--primary-green);
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
        }

        .subtitle {
            font-size: 13px;
            color: #8a90a1;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .counter-box {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        #live-counter {
            color: var(--primary-green);
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.4);
        }

        .input-group {
            text-align: left;
            margin-bottom: 25px;
        }

        .input-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: #6c7281;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: #09090d;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 16px;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: rgba(0, 255, 102, 0.5);
            background: #0d0d14;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient-btn);
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 1.5px;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        .submit-btn i {
            font-size: 14px;
            transition: transform 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px var(--primary-green), 0 5px 15px rgba(0,0,0,0.5);
        }

        .submit-btn:hover i { transform: translateX(5px); }

        .submit-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -50%; width: 30%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-25deg);
            transition: 0.75s;
        }

        .submit-btn:hover::after { left: 120%; }

        .loader-node {
            display: none;
            margin-top: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.05);
            border-top-color: var(--primary-green);
            border-radius: 50%;
            margin: 15px auto;
            animation: spin 0.8s linear infinite;
        }

        #timer-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: var(--primary-green);
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.4);
            margin-top: 5px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #0a0a0f;
            border: 1px solid var(--primary-green);
            padding: 12px 30px;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            z-index: 10000;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0, 255, 102, 0.15);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="bg-animate"></div>

    <div id="status-toast" class="toast">REQUEST INITIATED</div>

    <div class="card">
        <div class="logo-area">
            <img src="logo.png" class="panel-logo" alt="PANEL LOGO" onerror="this.style.display='none'">
        </div>

        <h1>Free 3-Day Trial</h1>
        <div class="subtitle">Enter your UID to get 3 days of free access</div>
        
        <div class="counter-box">
            <span>🎯 REGISTERED USERS: </span>
            <span id="live-counter">0 / 100</span>
        </div>

        <div id="form-container">
            <div class="input-group">
                <label class="input-label">Game UID</label>
                <input type="number" id="game-uid" placeholder="Enter your UID" autocomplete="off">
            </div>

            <button class="submit-btn" onclick="processTrialRequest()">
                <span>Claim Free Access</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>

        <div id="loader-screen" class="loader-node">
            <div class="spinner"></div>
            <div id="timer-text">INJECTING DATA: 10s</div>
        </div>
    </div>

    <script>
        // 🎵 গেমিং লেজার শ্যুট সাউন্ড ইফেক্ট
        const clickSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav");
        clickSound.volume = 0.4; 

        window.addEventListener("click", () => {
            clickSound.currentTime = 0; 
            clickSound.play().catch(err => console.log("Audio playback blocked"));
        });

        // 🚫 রাইট-ক্লিক পুরোপুরি লক (উইন্ডো লেভেল হার্ড লক)
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            e.stopPropagation();
        }, true);

        // 🚫 কীবোর্ড শর্টকাট লক (F12, Ctrl+U, Ctrl+Shift+I, J)
        document.addEventListener('keydown', function(e) {
            if (e.key === "F12" || 
                (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "i" || e.key === "j")) || 
                (e.ctrlKey && (e.key === "u" || e.key === "U" || e.key === "s" || e.key === "S"))) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        }, true);

        // ================= [ 🛠️ SERVER CONFIGURATION ] =================
        const maxLimit = 100; 
        const discordWebhookURL = "https://discordapp.com/api/webhooks/1506649694816964628/l26dH7LB9gD5NaAd-5mtzq7CKpN9iZjVcZMNBFCz8t3raBlJnfwZmoeVpSJyclp-KAAa"; 
        const isServerOnline = true; 

        // 🔗 ফায়ারবেজ ডাটাবেজ লিংক
        const firebaseDatabaseURL = "https://nazim69x-92451-default-rtdb.firebaseio.com/";
        // ===============================================================

        const webPathKey = window.location.hostname + window.location.pathname.replace(/[^a-zA-Z0-9]/g, "");
        const finalCounterEndpoint = `${firebaseDatabaseURL}counters/${webPathKey}.json`;

        let currentCount = 0;

        function fetchLiveDatabaseCounter() {
            fetch(finalCounterEndpoint)
            .then(res => res.json())
            .then(data => {
                currentCount = data !== null ? parseInt(data) : 0;
                document.getElementById("live-counter").innerText = currentCount + " / " + maxLimit;
            })
            .catch(err => { console.error("DB Connection Waiting..."); });
        }

        // প্রতি ৩ সেকেন্ড পর পর অটো সিঙ্ক হবে
        setInterval(fetchLiveDatabaseCounter, 3000); 
        fetchLiveDatabaseCounter();

        function showNotification(msg, isError = false) {
            const toast = document.getElementById("status-toast");
            toast.innerText = msg;
            toast.style.borderColor = isError ? "#ff0055" : "#00ff66";
            toast.style.boxShadow = isError ? "0 10px 25px rgba(255, 0, 85, 0.2)" : "0 10px 25px rgba(0, 255, 102, 0.2)";
            toast.style.top = "30px";
            setTimeout(() => { toast.style.top = "-100px"; }, 3500);
        }

        async function processTrialRequest() {
            if (currentCount >= maxLimit) {
                showNotification("REGISTRATION FULL! LIMIT REACHED.", true);
                return;
            }

            const uidField = document.getElementById("game-uid");
            const uidValue = uidField.value.trim();

            if (!uidValue) {
                showNotification("PLEASE ENTER A VALID GAME UID!", true);
                return;
            }

            if (isServerOnline === false) {
                showNotification("SERVER OFFLINE! PLEASE TRY AGAIN LATER.", true);
                return; 
            }

            document.getElementById("form-container").style.display = "none";
            document.getElementById("loader-screen").style.display = "block";

            let userIP = "Unknown/Proxy";
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                userIP = ipData.ip;
            } catch(e) {}

            const approveLink = "https://discord.com"; 
            const rejectLink = "https://discord.com";
            const nextRegNumber = currentCount + 1;

            const discordPayload = {
                username: "NHE PANEL TRACKER",
                avatar_url: "https://i.imgur.com/wSTFkRM.png",
                embeds: [{
                    title: "🎁 NEW FREE 3-DAY TRIAL REQUEST 🎁",
                    color: 65382,
                    fields: [
                        { name: "🎯 Target Player UID", value: `\`\`\`css\n${uidValue}\n\`\`\``, inline: false },
                        { name: "📈 Global Register Sequence", value: `\`${nextRegNumber} / ${maxLimit}\``, inline: true },
                        { name: "🌐 Network IP", value: userIP, inline: true }
                    ],
                    footer: { text: "Manage request via buttons below" },
                    timestamp: new Date()
                }],
                components: [
                    {
                        type: 1,
                        components: [
                            { type: 2, style: 5, label: "🟢 Approve / Yes", url: approveLink },
                            { type: 2, style: 5, label: "🔴 Reject / No", url: rejectLink }
                        ]
                    }
                ]
            };

            fetch(discordWebhookURL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(discordPayload)
            })
            .then(async res => {
                if (!res.ok) throw new Error("Discord Rejected");

                // ডাটাবেজে ভ্যালু আপডেট
                const updatedCountValue = currentCount + 1;
                await fetch(finalCounterEndpoint, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(updatedCountValue)
                });

                currentCount = updatedCountValue;
                document.getElementById("live-counter").innerText = currentCount + " / " + maxLimit;

                let timeLeft = 10;
                const timerElement = document.getElementById("timer-text");
                
                const countdown = setInterval(() => {
                    timeLeft--;
                    timerElement.innerText = "INJECTING DATA: " + timeLeft + "s";
                    
                    if (timeLeft <= 0) {
                        clearInterval(countdown);
                        showNotification("TRIAL CLAIMED SUCCESSFULLY!");
                        setTimeout(() => { location.reload(); }, 1500);
                    }
                }, 1000);

            })
            .catch(err => {
                showNotification("SERVER CONFIG ERROR! TRY AGAIN.", true);
                document.getElementById("form-container").style.display = "block";
                document.getElementById("loader-screen").style.display = "none";
            });
        }
    </script>
</body>
</html>
