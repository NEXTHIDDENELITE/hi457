<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHE SERVER OFFLINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff0055; /* Red for Offline */
            --secondary: #ff4d00;
            --danger: rgba(255, 0, 85, 0.8);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glow: 0 0 20px rgba(255, 0, 85, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }

        body {
            background-color: #030305;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Animated Background */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a0505 0%, #030305 100%);
            z-index: -1;
        }
        .orb {
            position: absolute;
            width: 300px; height: 300px;
            background: var(--primary);
            filter: blur(120px);
            opacity: 0.15;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(100%, 80%); } }

        /* The Glass Card */
        .card {
            width: 460px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            position: relative;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.05);
            z-index: 1;
            text-align: center;
        }

        .header-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .panel-logo {
            width: 80px; height: 80px;
            border-radius: 50%; 
            border: 2px solid var(--primary);
            padding: 5px;
            filter: drop-shadow(0 0 10px var(--primary));
            object-fit: cover;
            background: rgba(0, 0, 0, 0.3);
        }

        .status-header {
            font-family: 'Orbitron';
            font-size: 8px;
            letter-spacing: 2px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 5px var(--primary);
            margin-bottom: 5px;
        }

        .dot { width: 5px; height: 5px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 8px var(--primary); animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        h1 { 
            font-family: 'Orbitron'; 
            font-size: 22px; 
            letter-spacing: 2px; 
            font-weight: 900; 
            background: linear-gradient(to right, #fff, var(--secondary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .offline-notice {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid var(--primary);
            padding: 15px;
            border-radius: 12px;
            font-size: 13px;
            color: #ffb3c1;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        /* Social Dock */
        .social-dock {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: white;
            font-size: 20px;
            text-decoration: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-btn:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(255, 0, 85, 0.2);
        }

        .yt:hover { color: #ff0000; }
        .ds:hover { color: #5865F2; }
        .tg:hover { color: #0088cc; }

        .dev-footer {
            margin-top: 25px;
            font-family: 'Orbitron';
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.4);
        }
        .dev-footer span { color: var(--primary); }
    </style>
</head>
<body>

    <div class="bg-animate"><div class="orb"></div></div>

    <div class="card">
        <div class="header-container">
            <img src="logo.png" class="panel-logo" alt="NHE FREE TRIAL">
            <div class="header-text">
                <div class="status-header">
                    <div class="dot"></div> SERVER OFFLINE
                </div>
                <h1>NHE</h1>
            </div>
        </div>

        <div class="offline-notice">
            <b>SECURITY PROTOCOL ACTIVE:</b><br>
            Server is currently undergoing maintenance. Access to UID Injection is temporarily restricted.
        </div>
        
        <p style="font-size: 12px; color: #666; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;">Follow for Updates</p>

        <!-- SOCIAL LINKS SECTION -->
        <div class="social-dock">
            <a href="https://www.youtube.com/@NextHiddenElite" target="_blank" class="social-btn yt">
                <i class="fa-brands fa-youtube"></i>
            </a>
            <a href="https://discord.gg/QWMpcrHSF" target="_blank" class="social-btn ds">
                <i class="fa-brands fa-discord"></i>
            </a>
            <a href="https://t.me/+mWnSOBZmLyE1OTk1" target="_blank" class="social-btn tg">
                <i class="fa-brands fa-telegram"></i>
            </a>
        </div>
        
        <div class="dev-footer">Dev <span>&lt;/&gt;</span> KILLER</div>
    </div>

</body>
</html>
